<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>FlipOff.</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/editor.css">
</head>
<body>

  <div class="page-frame">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">FlipOff.</div>
      <nav class="header-nav">
        <div class="row-control">
          <button class="row-btn" id="rows-dec" title="Fewer rows">−</button>
          <span class="row-count" id="rows-count">5</span>
          <button class="row-btn" id="rows-inc" title="More rows">+</button>
        </div>
        <button class="edit-icon" id="edit-btn" title="Edit messages">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <button class="volume-icon" id="volume-btn" title="Toggle sound">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
      </nav>
    </header>

    <!-- Board -->
    <section class="board-section" id="board-container">
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
